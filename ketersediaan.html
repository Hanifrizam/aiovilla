<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Ketersediaan - AIO Villa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        /* Custom styling untuk flatpickr ukuran besar */
        .flatpickr-calendar.inline {
            width: 100%;
            max-width: 800px;
            box-shadow: none;
            border: 1px solid #f3f4f6;
            border-radius: 1.5rem;
            padding: 1rem;
        }
        .flatpickr-day {
            max-width: 60px;
            height: 60px;
            line-height: 60px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 500;
        }
        /* Styling untuk tanggal yang didisable (Sudah dibooking) */
        .flatpickr-day.flatpickr-disabled, .flatpickr-day.flatpickr-disabled:hover {
            color: #ef4444 !important; /* Warna merah muda */
            background-color: #fee2e2 !important; /* Background merah pudar */
            text-decoration: line-through;
            border-color: transparent;
        }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="p-2 hover:bg-gray-100 rounded-full transition text-gray-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </a>
                    <div class="text-2xl font-bold text-gray-900 tracking-tighter">AIO<span class="text-blue-600 font-light">Villa</span></div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">Kalender Ketersediaan</h1>
            <p class="text-gray-500">Cek tanggal kosong untuk merencanakan liburan Anda. Tanggal berwarna merah muda berarti villa sudah dipesan.</p>
        </div>

        <div class="bg-white p-6 md:p-10 rounded-[2rem] shadow-xl border border-gray-100 mb-10 flex justify-center flex-col items-center">
            
            <div class="flex gap-6 mb-8 w-full justify-center border-b border-gray-100 pb-6">
                <div class="flex items-center gap-2">
                    <div class="w-6 h-6 rounded bg-white border border-gray-200"></div>
                    <span class="text-sm font-medium text-gray-600">Tersedia</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-6 h-6 rounded bg-red-100 text-red-500 flex items-center justify-center line-through text-xs border border-transparent"></div>
                    <span class="text-sm font-medium text-red-600">Sudah Dipesan</span>
                </div>
            </div>

            <div class="w-full flex justify-center" id="calendar-container">
                <p class="text-gray-500 animate-pulse py-10" id="loading-text">Menyinkronkan data dengan database...</p>
                <input type="text" id="availability-calendar" class="hidden">
            </div>
        </div>

        <div class="text-center">
            <a href="index.html" class="inline-block bg-blue-600 text-white px-10 py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg transform hover:-translate-y-1">
                Kembali & Lakukan Pemesanan
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/id.js"></script>
    <script>
        const SUPABASE_URL = 'https://oyumpfcjphymiaxlshjt.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_rnnwDTrBaZguDWkFqgWLEA_kcLo0CDZ';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function initAvailabilityCalendar() {
            try {
                const { data, error } = await supabaseClient
                    .from('bookings')
                    .select('checkin, checkout')
                    .neq('status', 'cancelled');

                document.getElementById('loading-text').style.display = 'none';

                let disabledDateRanges = [];
                if (!error && data) {
                    disabledDateRanges = data.map(booking => {
                        return { from: booking.checkin, to: booking.checkout };
                    });
                }

                flatpickr("#availability-calendar", {
                    inline: true,
                    minDate: "today",
                    showMonths: window.innerWidth > 768 ? 2 : 1, // Tampilkan 2 bulan di desktop
                    locale: "id", // Bahasa Indonesia
                    disable: disabledDateRanges,
                    onChange: function(selectedDates, dateStr, instance) {
                        // Hilangkan efek seleksi karena ini cuma buat lihat-lihat
                        instance.clear();
                    }
                });
            } catch (err) {
                document.getElementById('loading-text').innerText = "Gagal memuat data. Silakan refresh halaman.";
            }
        }

        document.addEventListener('DOMContentLoaded', initAvailabilityCalendar);
    </script>
</body>
</html>
