<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Availability - AIO Villa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        
        /* Transisi Halaman Mulus */
        .page-enter { animation: pageFadeIn 0.8s ease-out forwards; }
        .page-exit { animation: pageFadeOut 0.4s ease-in forwards; }
        @keyframes pageFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pageFadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* Kustomisasi Flatpickr agar selalu 1 bulan dan pas di tengah */
        .flatpickr-calendar.inline {
            width: 100% !important;
            max-width: 500px !important; /* Dipersempit agar 1 bulan tidak melar di Desktop */
            margin: 0 auto; /* Tengah rata */
            box-shadow: none;
            border: 1px solid #f3f4f6;
            border-radius: 1.5rem;
            padding: 0.5rem;
        }
        
        /* Memaksa kontainer dalam kalender mengikuti lebar penuh dari batas max-width di atas */
        .flatpickr-innerContainer, .flatpickr-rContainer, .dayContainer, .flatpickr-days {
            width: 100% !important;
            max-width: 100% !important;
            min-width: 100% !important;
        }

        .flatpickr-day {
            width: 14.28% !important; /* 100% dibagi 7 hari */
            max-width: 14.28% !important;
            height: 45px !important; 
            line-height: 45px !important;
            border-radius: 10px;
            font-size: 0.95rem !important;
            font-weight: 500;
            transition: all 0.3s ease;
            margin: 2px 0;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
        }
        
        /* Ukuran Kalender untuk Layar Medium & Besar */
        @media (min-width: 640px) {
            .flatpickr-calendar.inline { padding: 1.5rem; }
            .flatpickr-day {
                height: 55px !important;
                line-height: 55px !important;
                font-size: 1.05rem !important;
            }
        }
        
        /* Hover Effect untuk tanggal tersedia */
        .flatpickr-day:not(.flatpickr-disabled):not(.today):hover {
            background-color: #eff6ff !important;
            border-color: #bfdbfe !important;
            color: #2563eb !important;
        }
        
        /* Styling untuk tanggal yang didisable (Sudah dibooking) */
        .flatpickr-day.flatpickr-disabled, .flatpickr-day.flatpickr-disabled:hover {
            color: #ef4444 !important; 
            background-color: #fee2e2 !important; 
            text-decoration: line-through;
            border-color: transparent;
            opacity: 0.8;
        }

        .swal2-title, .swal2-html-container { font-family: 'Plus Jakarta Sans', sans-serif !important; }
        .swal2-popup { border-radius: 1.5rem !important; }
        
        /* Animasi Modern Loading Pulse */
        .modern-pulse {
            position: relative;
            width: 80px;
            height: 80px;
        }
        .modern-pulse div {
            position: absolute;
            border: 4px solid #3b82f6;
            opacity: 1;
            border-radius: 50%;
            animation: modern-pulse 1s cubic-bezier(0, 0.2, 0.8, 1) infinite;
        }
        .modern-pulse div:nth-child(2) { animation-delay: -0.5s; }
        @keyframes modern-pulse {
            0% { top: 36px; left: 36px; width: 0; height: 0; opacity: 0; }
            4.9% { top: 36px; left: 36px; width: 0; height: 0; opacity: 0; }
            5% { top: 36px; left: 36px; width: 0; height: 0; opacity: 1; }
            100% { top: 0px; left: 0px; width: 72px; height: 72px; opacity: 0; }
        }
    </style>
</head>
<body class="text-gray-800 page-enter">

    <nav class="bg-white/90 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50 shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 md:h-20 items-center">
                <div class="flex items-center gap-2 md:gap-4">
                    <a href="javascript:void(0)" onclick="navigateWithTransition('index.html')" class="p-1.5 md:p-2 hover:bg-gray-100 rounded-full transition text-gray-600 focus:outline-none">
                        <svg class="w-5 h-5 md:w-6 md:h-6 transform hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </a>
                    <div class="text-xl md:text-2xl font-bold text-gray-900 tracking-tighter">AIO<span class="text-blue-600 font-light">Villa</span></div>
                </div>
                
                <div class="flex items-center gap-2 md:gap-4">
                    <button onclick="toggleLang()" class="font-bold flex items-center gap-1 hover:bg-gray-200 transition bg-gray-100 px-2 py-1 md:px-3 md:py-1.5 rounded-lg border border-gray-200 text-xs md:text-sm shadow-sm">
                        <span id="lang-en" class="text-blue-600">EN</span> / <span id="lang-id" class="text-gray-400 font-normal">ID</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
        <div class="text-center mb-8 md:mb-10" data-aos="fade-down">
            <h1 data-i18n="title" class="text-2xl sm:text-3xl md:text-4xl font-bold text-gray-900 mb-3 md:mb-4 tracking-tight">Availability Calendar</h1>
            <p data-i18n="desc" class="text-sm md:text-base text-gray-500 max-w-lg mx-auto px-2">Check available dates to plan your vacation. Strikethrough pink dates mean the villa is already booked.</p>
        </div>

        <div class="bg-white p-4 sm:p-6 md:p-10 rounded-[2rem] md:rounded-[2.5rem] shadow-xl md:shadow-2xl shadow-blue-900/5 border border-gray-100 mb-8 md:mb-10 flex justify-center flex-col items-center" data-aos="zoom-in" data-aos-delay="100">
            
            <div class="flex flex-wrap gap-4 md:gap-8 mb-6 md:mb-8 w-full justify-center border-b border-gray-100 pb-5 md:pb-6">
                <div class="flex items-center gap-2 md:gap-3">
                    <div class="w-5 h-5 md:w-6 md:h-6 rounded-md md:rounded-lg bg-white border border-gray-200 shadow-sm"></div>
                    <span data-i18n="lbl-avail" class="text-xs md:text-sm font-bold text-gray-600">Available</span>
                </div>
                <div class="flex items-center gap-2 md:gap-3">
                    <div class="w-5 h-5 md:w-6 md:h-6 rounded-md md:rounded-lg bg-red-100 text-red-500 flex items-center justify-center line-through text-[10px] md:text-xs border border-red-200 shadow-sm"></div>
                    <span data-i18n="lbl-booked" class="text-xs md:text-sm font-bold text-red-600">Already Booked</span>
                </div>
            </div>

            <div class="w-full flex justify-center items-center min-h-[300px] overflow-hidden" id="calendar-container">
                <div id="loading-state" class="flex flex-col items-center gap-4 md:gap-6 py-10 w-full">
                    <div class="modern-pulse"><div></div><div></div></div>
                    <p id="loading-text" data-i18n="loading" class="text-blue-600 font-semibold text-sm md:text-base animate-pulse text-center px-4">Syncing data with the system...</p>
                </div>
                
                <input type="text" id="availability-calendar" class="hidden">
            </div>
        </div>

        <div class="text-center" data-aos="fade-up" data-aos-delay="200">
            <a href="javascript:void(0)" onclick="navigateWithTransition('index.html')" class="inline-flex w-full sm:w-auto items-center justify-center gap-2 md:gap-3 bg-gray-900 text-white px-6 md:px-10 py-3.5 md:py-4 rounded-xl md:rounded-2xl font-bold hover:bg-gray-800 transition shadow-[0_10px_20px_rgba(0,0,0,0.1)] transform hover:-translate-y-1 text-sm md:text-lg">
                <span data-i18n="btn-back">Return to Home</span>
                <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </a>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/id.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // ANIMASI TRANSISI HALAMAN
        function navigateWithTransition(url) {
            document.body.classList.add('page-exit');
            setTimeout(() => {
                window.location.href = url;
            }, 400); 
        }

        const SUPABASE_URL = 'https://oyumpfcjphymiaxlshjt.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_rnnwDTrBaZguDWkFqgWLEA_kcLo0CDZ';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // TRANSLATION LOGIC
        const translations = {
            "id": { 
                "title": "Kalender Ketersediaan", 
                "desc": "Cek tanggal kosong untuk merencanakan liburan Anda. Tanggal berwarna merah muda dengan coretan berarti villa telah dipesan.", 
                "lbl-avail": "Tersedia", 
                "lbl-booked": "Sudah Dipesan", 
                "loading": "Menyinkronkan data dengan sistem...", 
                "btn-back": "Kembali ke Beranda",
                "toast-msg": "Bahasa diubah ke Indonesia"
            },
            "en": { 
                "title": "Availability Calendar", 
                "desc": "Check available dates to plan your vacation. Strikethrough pink dates mean the villa is already booked.", 
                "lbl-avail": "Available", 
                "lbl-booked": "Already Booked", 
                "loading": "Syncing data with the system...", 
                "btn-back": "Return to Home",
                "toast-msg": "Language changed to English"
            }
        };

        let currentLang = 'en'; // <-- Ini yang menentukan base languagenya
        let disabledDateRangesGlobal = [];

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'id' : 'en';
            
            document.getElementById('lang-en').className = currentLang === 'en' ? 'text-blue-600' : 'text-gray-400 font-normal';
            document.getElementById('lang-id').className = currentLang === 'id' ? 'text-blue-600' : 'text-gray-400 font-normal';
            
            document.querySelectorAll('[data-i18n]').forEach(el => { 
                el.innerHTML = translations[currentLang][el.getAttribute('data-i18n')]; 
            });

            // Re-init Flatpickr untuk mengubah bahasanya
            if (fpInstance) {
                fpInstance.destroy();
                initFlatpickr(disabledDateRangesGlobal);
            }

            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: 'success',
                title: translations[currentLang]['toast-msg'],
                showConfirmButton: false,
                timer: 1500,
                timerProgressBar: true,
                showClass: { popup: 'animate__animated animate__fadeInRight' },
                hideClass: { popup: 'animate__animated animate__fadeOutRight' }
            });
        }

        let fpInstance;

        function initFlatpickr(disabledDates) {
            fpInstance = flatpickr("#availability-calendar", {
                inline: true,
                minDate: "today",
                showMonths: 1, // Kunci agar selalu tampil 1 bulan saja
                locale: currentLang === 'id' ? "id" : "default",
                disable: disabledDates,
                onChange: function(selectedDates, dateStr, instance) {
                    instance.clear();
                }
            });
        }

        async function fetchAndInitCalendar() {
            try {
                const { data, error } = await supabaseClient
                    .from('bookings')
                    .select('checkin, checkout')
                    .neq('status', 'cancelled');

                setTimeout(() => {
                    document.getElementById('loading-state').style.display = 'none';
                    
                    if (!error && data) {
                        disabledDateRangesGlobal = data.map(booking => {
                            return { from: booking.checkin, to: booking.checkout };
                        });
                    }
                    
                    initFlatpickr(disabledDateRangesGlobal);
                    
                }, 800);

            } catch (err) {
                // Bugfix: Menambahkan id="loading-text" pada tag HTML agar baris ini tidak error
                document.getElementById('loading-text').innerText = currentLang === 'id' ? "Gagal memuat data. Silakan refresh halaman." : "Failed to load data. Please refresh the page.";
                document.querySelector('.modern-pulse').style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', fetchAndInitCalendar);
    </script>
</body>
</html>
