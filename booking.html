<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemesanan - Serenity Villa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html" class="text-xl font-bold text-gray-900">Serenity<span class="text-blue-600">Villa</span></a>
                <span class="text-sm font-medium text-gray-500">Langkah 2 dari 3 - Pembayaran</span>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <div class="w-full lg:w-2/3 space-y-8">
                
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-2xl font-bold mb-6">Detail Pemesan</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Nama Lengkap</label>
                            <input type="text" placeholder="Masukkan nama" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                            <input type="email" placeholder="email@contoh.com" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Nomor Telepon</label>
                            <input type="tel" placeholder="08123456789" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-2xl font-bold mb-6">Metode Pembayaran</h2>
                    
                    <div class="space-y-4">
                        <label class="flex items-center p-4 border rounded-xl cursor-pointer hover:bg-gray-50 transition border-blue-500 bg-blue-50">
                            <input type="radio" name="payment" class="w-5 h-5 text-blue-600 focus:ring-blue-500" checked>
                            <div class="ml-4 flex-1">
                                <span class="block font-semibold">Transfer Virtual Account</span>
                                <span class="text-sm text-gray-500">BCA, Mandiri, BNI, BRI</span>
                            </div>
                        </label>

                        <label class="flex items-center p-4 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition">
                            <input type="radio" name="payment" class="w-5 h-5 text-blue-600 focus:ring-blue-500">
                            <div class="ml-4 flex-1">
                                <span class="block font-semibold">E-Wallet / QRIS</span>
                                <span class="text-sm text-gray-500">Gopay, OVO, Dana, ShopeePay</span>
                            </div>
                        </label>

                        <label class="flex items-center p-4 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition">
                            <input type="radio" name="payment" class="w-5 h-5 text-blue-600 focus:ring-blue-500">
                            <div class="ml-4 flex-1">
                                <span class="block font-semibold">Kartu Kredit / Debit</span>
                                <span class="text-sm text-gray-500">Visa, Mastercard, JCB</span>
                            </div>
                        </label>
                    </div>
                </div>

                <button onclick="prosesPembayaran()" class="w-full bg-blue-600 text-white font-bold text-lg py-4 rounded-xl shadow-lg hover:bg-blue-700 transition">
                    Bayar Sekarang
                </button>
            </div>

            <div class="w-full lg:w-1/3">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-24">
                    <h3 class="text-xl font-bold mb-4">Ringkasan Pesanan</h3>
                    <img src="Gambar Villa (1).jpeg" alt="Kamar" class="w-full h-40 object-cover rounded-xl mb-4">
                    
                    <div class="border-b border-gray-100 pb-4 mb-4">
                        <h4 class="font-bold text-lg">Serenity Villa - Master Suite</h4>
                        <p class="text-sm text-gray-500 mt-1">2 Tamu • 1 Malam</p>
                    </div>

                    <div class="space-y-3 text-sm mb-6">
                        <div class="flex justify-between">
                            <span class="text-gray-600">Check-in</span>
                            <span class="font-semibold">15 Agu 2026</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">Check-out</span>
                            <span class="font-semibold">16 Agu 2026</span>
                        </div>
                    </div>

                    <div class="border-t border-gray-100 pt-4 space-y-3">
                        <div class="flex justify-between text-gray-600">
                            <span>Harga (1 malam)</span>
                            <span>Rp 1.500.000</span>
                        </div>
                        <div class="flex justify-between text-gray-600">
                            <span>Pajak & Biaya (10%)</span>
                            <span>Rp 150.000</span>
                        </div>
                        <div class="flex justify-between font-bold text-xl pt-2">
                            <span>Total Harga</span>
                            <span class="text-blue-600">Rp 1.650.000</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function prosesPembayaran() {
            alert('Sedang memproses pembayaran...\nSimulasi berhasil. Terima kasih telah memesan Serenity Villa');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
